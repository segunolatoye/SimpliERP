name: E2E Tests

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * *' # Nightly at midnight UTC

jobs:
  playwright-e2e:
    name: Playwright E2E Tests
    # Only run if label matches 'run-e2e' or triggered by nightly cron schedule
    if: |
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests against Preview Deploy
        run: npx playwright test
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.pull_request.head.repo.clone_url != '' && secrets.PREVIEW_DEPLOY_BASE_URL || 'http://localhost:3000' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
