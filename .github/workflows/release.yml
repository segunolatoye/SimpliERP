name: Release & Package Publishing

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0

jobs:
  release:
    name: Tagged Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Version Changelog
        id: generate-changelog
        run: |
          echo "Generating package changelogs..."
          # Write logic to generate changelog using conventional-changelog or changesets
          # npx changeset version
          # npx changeset publish
          echo "Changelog created."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## SimpliERP Release ${{ github.ref_name }}
            
            Automatic changelog generated on merge.
            
            ### Package Status:
            - `@simpli-erp/ui-kit` published.
            - Core services updated.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
