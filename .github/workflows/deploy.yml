name: CD Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Migrate, and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run Prisma Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }} # Use Direct URL connection for migration transactions

      - name: Deploy to Hosting Provider (Vercel Production)
        id: deploy-step
        run: |
          echo "Deploying production build..."
          # Deploy command (mocked or configured via Vercel CLI)
          # npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
          echo "Deployment successful."

      - name: Run Post-Deployment Smoke Test
        id: smoke-test
        run: |
          echo "Running smoke tests..."
          # Fetch app health checks, fail on non-200 responses
          curl -f -s -S -o /dev/null -w "%{http_code}" https://simpli-erp.vercel.app/api/health || exit 1
          echo "Smoke test passed successfully."

      - name: Automatic Rollback on Failure
        if: failure() && steps.deploy-step.outcome == 'success'
        run: |
          echo "Smoke tests failed. Reverting to last successful production deployment..."
          # Revert command
          # npx vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes
          echo "Rollback initiated."
          exit 1
