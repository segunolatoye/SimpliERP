name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint, Type-Check, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: ESLint Check
        run: npm run lint

      - name: TypeScript Check
        run: npm run type-check

      - name: Production Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: NPM Security Audit
        run: npm audit --audit-level=high

      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: false # Block on high-severity vulnerabilities

  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Database Services (Docker Compose)
        run: |
          docker compose -f docker-compose.test.yml up -d
          # Wait for database health check before continuing
          sleep 10

      - name: Run Prisma Migrations on Test DB
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simpli_erp_test

      - name: Run Tests with Coverage
        run: npx vitest run --coverage --coverage.thresholds.lines=80
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simpli_erp_test
